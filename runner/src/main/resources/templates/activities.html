<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<th:block th:fragment="content">
    <form method="get" class="filter-bar">
        <div class="filter-row">
            <input type="hidden" name="sort" th:value="${currentSort}">
            <input type="hidden" name="order" th:value="${currentOrder}">
            <select name="period" id="period" onchange="this.form.submit()">
                <option value="all" th:selected="${filterPeriod == 'all' or filterPeriod == ''}">Alle periodes</option>
                <option value="last-month" th:selected="${filterPeriod == 'last-month'}">Laatste maand</option>
                <option value="last-year" th:selected="${filterPeriod == 'last-year'}">Laatste jaar</option>
                <option value="ytd" th:selected="${filterPeriod == 'ytd'}">Dit jaar (YTD)</option>
                <option value="last-2-years" th:selected="${filterPeriod == 'last-2-years'}">Laatste 2 jaar</option>
                <option value="last-3-years" th:selected="${filterPeriod == 'last-3-years'}">Laatste 3 jaar</option>
                <option value="custom" th:selected="${filterPeriod == 'custom'}">Aangepast</option>
            </select>
            <div class="custom-dates" id="customDates2" th:style="${filterPeriod == 'custom'} ? 'display:inline-flex' : 'display:none'">
                <input type="date" name="from" th:value="${filterFrom}" onchange="this.form.submit()">
                <span>tot</span>
                <input type="date" name="till" th:value="${filterTill}" onchange="this.form.submit()">
            </div>
            <select name="type" onchange="this.form.submit()">
                <option value="all" th:selected="${filterType == 'all' or filterType == ''}">Alle types</option>
                <option value="run" th:selected="${filterType == 'run'}">Lopen</option>
                <option value="ride" th:selected="${filterType == 'ride'}">Fietsen</option>
                <option value="swim" th:selected="${filterType == 'swim'}">Zwemmen</option>
                <option value="other" th:selected="${filterType == 'other'}">Overig</option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm" style="display:none">Filter</button>
            <a href="?" class="btn btn-sm" style="background:#eee;color:#333;">Reset</a>
        </div>
    </form>
    <div class="card">
        <div class="flex" style="justify-content:space-between;">
            <h2>Alle trainingen</h2>
            <span class="text-muted" th:text="${total} + ' trainingen'">0</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th><a th:href="@{/activities(sort='date', order=(${currentSort == 'date' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'date'} ? 'sort-active' : ''" th:title="'Sorteer op datum'">Datum<span th:if="${currentSort == 'date'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='name', order=(${currentSort == 'name' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'name'} ? 'sort-active' : ''" th:title="'Sorteer op naam'">Naam<span th:if="${currentSort == 'name'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='type', order=(${currentSort == 'type' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'type'} ? 'sort-active' : ''" th:title="'Sorteer op type'">Type<span th:if="${currentSort == 'type'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='distance', order=(${currentSort == 'distance' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'distance'} ? 'sort-active' : ''" th:title="'Sorteer op afstand'">Afstand<span th:if="${currentSort == 'distance'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='pace', order=(${currentSort == 'pace' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'pace'} ? 'sort-active' : ''" th:title="'Sorteer op tempo'">Tempo<span th:if="${currentSort == 'pace'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='avgHr', order=(${currentSort == 'avgHr' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'avgHr'} ? 'sort-active' : ''" th:title="'Sorteer op gemiddelde hartslag'">HR gem<span th:if="${currentSort == 'avgHr'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='maxHr', order=(${currentSort == 'maxHr' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'maxHr'} ? 'sort-active' : ''" th:title="'Sorteer op maximale hartslag'">HR max<span th:if="${currentSort == 'maxHr'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='cadence', order=(${currentSort == 'cadence' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'cadence'} ? 'sort-active' : ''" th:title="'Sorteer op cadans'">Cadans<span th:if="${currentSort == 'cadence'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='elevation', order=(${currentSort == 'elevation' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'elevation'} ? 'sort-active' : ''" th:title="'Sorteer op elevatie'">Elevatie<span th:if="${currentSort == 'elevation'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                    <th><a th:href="@{/activities(sort='duration', order=(${currentSort == 'duration' and currentOrder == 'asc'} ? 'desc' : 'asc'), period=${filterPeriod}, from=${filterFrom}, till=${filterTill}, type=${filterType})}" class="sort-link" th:classappend="${currentSort == 'duration'} ? 'sort-active' : ''" th:title="'Sorteer op duur'">Duur<span th:if="${currentSort == 'duration'}" th:text="${currentOrder == 'asc'} ? ' â–˛' : ' â–Ľ'"></span></a></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${activities}">
                    <td th:text="${a.date}">-</td>
                    <td><a th:href="@{'/activity/' + ${a.id}}" th:text="${a.name}" style="color:#1a1a2e;">-</a></td>
                    <td><span class="badge" th:classappend="'badge-' + ${a.typeClass}" th:text="${a.type}">-</span></td>
                    <td th:text="${a.distance}">-</td>
                    <td th:text="${a.pace}">-</td>
                    <td th:text="${a.avgHr}">-</td>
                    <td th:text="${a.maxHr}">-</td>
                    <td th:text="${a.cadence}">-</td>
                    <td th:text="${a.elevation}">-</td>
                    <td th:text="${a.duration}">-</td>
                </tr>
            </tbody>
        </table>
    </div>
</th:block>
</html>
